<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28; --surface3: #22222f;
  --accent: #e8ff47; --accent2: #ff6b35; --text: #f0f0f0; --muted: #888;
  --border: rgba(255,255,255,0.08); --gold: #FFD700; --silver: #C0C0C0; --diamond: #b9f2ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.nav-brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; }
.nav-brand span { color: var(--accent); }
.badge-admin { background: var(--accent); color: #000; font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: 1px; }
.btn-logout { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 16px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
.btn-logout:hover { border-color: #ff6b6b; color: #ff6b6b; }
.main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; margin-bottom: 2rem; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem 1.5rem; }
.stat-number { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; color: var(--accent); }
.stat-label { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }
.tabs { display: flex; gap: 4px; margin-bottom: 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; width: fit-content; }
.tab { padding: 8px 20px; border-radius: 8px; font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: all 0.2s; color: var(--muted); border: none; background: none; font-family: 'DM Sans', sans-serif; }
.tab.active { background: var(--accent); color: #000; font-weight: 700; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.4rem; }
.section-title span { color: var(--accent); }
.btn-primary { background: var(--accent); color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary:hover { background: #d4eb2e; transform: translateY(-1px); }
.btn-danger { background: transparent; border: 1px solid rgba(255,68,68,0.3); color: #ff6b6b; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
.btn-danger:hover { background: rgba(255,68,68,0.1); }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
thead tr { background: var(--surface2); }
thead th { padding: 12px 16px; text-align: left; font-size: 0.73rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.02); }
td { padding: 14px 16px; font-size: 0.9rem; vertical-align: middle; }
.td-id { color: var(--muted); font-size: 0.78rem; font-family: monospace; }
.city-badge { background: rgba(232,255,71,0.1); color: var(--accent); padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; }
.seats-badge { background: rgba(255,107,53,0.1); color: var(--accent2); padding: 3px 10px; border-radius: 20px; font-size: 0.78rem; }
.actions-cell { display: flex; gap: 8px; align-items: center; }
.movies-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(190px,1fr)); gap: 1rem; }
.movie-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color 0.2s; }
.movie-card:hover { border-color: rgba(232,255,71,0.2); }
.movie-poster { width: 100%; height: 130px; object-fit: cover; display: block; background: var(--surface3); }
.movie-poster-ph { width: 100%; height: 130px; background: var(--surface3); display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--muted); }
.movie-info { padding: 10px 12px; }
.movie-title-card { font-weight: 600; font-size: 0.88rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.movie-dur { font-size: 0.73rem; color: var(--muted); margin-bottom: 8px; }
.theater-panel { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 1rem; }
.theater-panel-hdr { padding: 1rem 1.2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.theater-panel-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; }
.shows-section { padding: 1rem 1.2rem; }
.show-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.show-row:last-child { border-bottom: none; }
.show-movie-name { font-weight: 600; font-size: 0.88rem; margin-bottom: 3px; }
.show-time-info { font-size: 0.78rem; color: var(--muted); }
.show-prices { display: flex; gap: 8px; }
.price-chip { font-size: 0.72rem; padding: 2px 8px; border-radius: 12px; font-weight: 600; }
.price-chip.gold { background: rgba(255,215,0,0.1); color: var(--gold); border: 1px solid rgba(255,215,0,0.2); }
.price-chip.silver { background: rgba(192,192,192,0.1); color: var(--silver); border: 1px solid rgba(192,192,192,0.2); }
.price-chip.diamond { background: rgba(185,242,255,0.1); color: var(--diamond); border: 1px solid rgba(185,242,255,0.2); }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.2s ease; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem; }
.modal-close { background: var(--surface2); border: none; color: var(--muted); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
.form-group { margin-bottom: 1rem; }
.form-label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; }
.form-control { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s; outline: none; }
.form-control:focus { border-color: var(--accent); }
.form-control::placeholder { color: var(--muted); }
textarea.form-control { resize: vertical; min-height: 80px; }
select.form-control option { background: var(--surface2); color: var(--text); }
.img-tabs { display: flex; gap: 8px; margin-bottom: 1rem; }
.img-tab { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-size: 0.82rem; cursor: pointer; text-align: center; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
.img-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.05); }
.pricing-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.gold-label { color: var(--gold); }
.silver-label { color: var(--silver); }
.diamond-label { color: var(--diamond); }
.toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; font-size: 0.9rem; z-index: 9999; display: flex; align-items: center; gap: 10px; transform: translateY(100px); opacity: 0; transition: all 0.3s; max-width: 320px; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: rgba(100,255,100,0.3); }
.toast.error { border-color: rgba(255,68,68,0.3); }
.loading { color: var(--muted); font-size: 0.85rem; padding: 2rem; text-align: center; }
.empty-state { text-align: center; padding: 3rem; color: var(--muted); }
.empty-icon { font-size: 2.5rem; margin-bottom: 0.5rem; opacity: 0.4; }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">Movie<span>Admin</span></div>
  <div style="display:flex;align-items:center;gap:1rem">
    <span class="badge-admin">Admin</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="main">

  <div class="stats-row">
    <div class="stat-card"><div class="stat-number" id="statMovies">—</div><div class="stat-label">Total Movies</div></div>
    <div class="stat-card"><div class="stat-number" id="statTheaters">—</div><div class="stat-label">Theaters</div></div>
    <div class="stat-card"><div class="stat-number" id="statShows">—</div><div class="stat-label">Active Shows</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('movies',this)">🎬 Movies</button>
    <button class="tab" onclick="switchTab('theaters',this)">🏛️ Theaters</button>
    <button class="tab" onclick="switchTab('shows',this)">🕐 Shows</button>
  </div>

  <!-- MOVIES TAB -->
  <div class="tab-content active" id="tab-movies">
    <div class="section-header">
      <div class="section-title">All <span>Movies</span></div>
      <button class="btn-primary" onclick="openModal('addMovieModal')">+ Add Movie</button>
    </div>
    <div class="movies-grid" id="moviesGrid"><div class="loading">Loading...</div></div>
  </div>

  <!-- THEATERS TAB -->
  <div class="tab-content" id="tab-theaters">
    <div class="section-header">
      <div class="section-title">All <span>Theaters</span></div>
      <button class="btn-primary" onclick="openModal('addTheaterModal')">+ Add Theater</button>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>ID</th><th>Name</th><th>City</th><th>Seats</th><th>Actions</th></tr></thead>
        <tbody id="theatersBody"><tr><td colspan="5" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- SHOWS TAB -->
  <div class="tab-content" id="tab-shows">
    <div class="section-header">
      <div class="section-title">Show <span>Timings</span></div>
      <button class="btn-primary" onclick="openAddShowModal()">+ Add Show</button>
    </div>
    <div id="showsByTheater"><div class="loading">Loading...</div></div>
  </div>

</div>

<!-- ADD MOVIE MODAL -->
<div class="modal-overlay" id="addMovieModal">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-title">Add Movie</div>
      <button class="modal-close" onclick="closeModal('addMovieModal')">✕</button>
    </div>
    <!-- No theater selection — movie is now global -->
    <div style="background:rgba(232,255,71,0.05);border:1px solid rgba(232,255,71,0.1);border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:0.8rem;color:var(--muted)">
      Movies are <strong style="color:var(--accent)">global</strong> — theaters are assigned when adding show timings
    </div>
    <div class="form-group">
      <label class="form-label">Movie Title</label>
      <input class="form-control" id="m-title" placeholder="e.g. Interstellar">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-control" id="m-desc" placeholder="Short description..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Duration (minutes)</label>
      <input class="form-control" id="m-duration" type="number" placeholder="e.g. 169">
    </div>
    <div class="form-group">
      <label class="form-label">Movie Image</label>
      <div class="img-tabs">
        <button class="img-tab active" id="itab-url" onclick="switchImgTab('url')">Paste URL</button>
        <button class="img-tab" id="itab-file" onclick="switchImgTab('file')">Upload File</button>
      </div>
      <div id="img-url-sec"><input class="form-control" id="m-imageUrl" placeholder="https://...poster.jpg"></div>
      <div id="img-file-sec" style="display:none"><input class="form-control" id="m-imageFile" type="file" accept="image/*" style="padding:6px"></div>
    </div>
    <button class="btn-primary" style="width:100%;justify-content:center" onclick="addMovie()">Add Movie</button>
  </div>
</div>

<!-- ADD THEATER MODAL -->
<div class="modal-overlay" id="addTheaterModal">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-title">Add Theater</div>
      <button class="modal-close" onclick="closeModal('addTheaterModal')">✕</button>
    </div>
    <div class="form-group"><label class="form-label">Theater Name</label><input class="form-control" id="t-name" placeholder="e.g. PVR Hyderabad"></div>
    <div class="form-group"><label class="form-label">City</label><input class="form-control" id="t-city" placeholder="e.g. Hyderabad"></div>
    <div class="form-group"><label class="form-label">Total Seats</label><input class="form-control" id="t-seats" type="number" placeholder="e.g. 200"></div>
    <button class="btn-primary" style="width:100%;justify-content:center" onclick="addTheater()">Add Theater</button>
  </div>
</div>

<!-- ADD SHOW MODAL — picks movie + theater separately -->
<div class="modal-overlay" id="addShowModal">
  <div class="modal-box">
    <div class="modal-hdr">
      <div class="modal-title">Add Show Timing</div>
      <button class="modal-close" onclick="closeModal('addShowModal')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Select Movie</label>
      <select class="form-control" id="s-movieId"><option value="">-- Select a movie --</option></select>
    </div>
    <div class="form-group">
      <label class="form-label">Select Theater</label>
      <select class="form-control" id="s-theaterId"><option value="">-- Select a theater --</option></select>
    </div>
    <div class="form-group">
      <label class="form-label">Show Date and Time</label>
      <input class="form-control" id="s-showTime" type="datetime-local">
    </div>
    <div class="form-group">
      <label class="form-label">Pricing by Section</label>
      <div class="pricing-grid">
        <div><label class="form-label gold-label">Gold (₹)</label><input class="form-control" id="s-gold" type="number" placeholder="500"></div>
        <div><label class="form-label silver-label">Silver (₹)</label><input class="form-control" id="s-silver" type="number" placeholder="300"></div>
        <div><label class="form-label diamond-label">Diamond (₹)</label><input class="form-control" id="s-diamond" type="number" placeholder="700"></div>
      </div>
    </div>
    <button class="btn-primary" style="width:100%;justify-content:center" onclick="addShow()">Add Show</button>
  </div>
</div>

<div class="toast" id="toast"><span id="toastIcon"></span><span id="toastMsg"></span></div>

<script src="/js/axios.min.js"></script>
<script>

// ── AUTH ──────────────────────────────────────────────────────────────
const token = localStorage.getItem('token');
if (!token) window.location.href = '/index.html';
axios.defaults.headers.common['Authorization'] = token;

let allMovies = [];
let allTheaters = [];

// ── LOGOUT ────────────────────────────────────────────────────────────
function logout() {
    localStorage.removeItem('token');
    delete axios.defaults.headers.common['Authorization'];
    window.location.href = '/index.html';
}

// ── TOAST ─────────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    document.getElementById('toastIcon').textContent = type === 'success' ? '✓' : '✕';
    t.className = 'toast show ' + type;
    setTimeout(() => t.className = 'toast', 3000);
}

// ── MODAL ─────────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
    m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ── TABS ──────────────────────────────────────────────────────────────
function switchTab(name, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
    if (name === 'theaters') loadTheaters();
    if (name === 'shows') loadShowsByTheater();
}

// ── IMAGE TAB ─────────────────────────────────────────────────────────
function switchImgTab(tab) {
    document.getElementById('img-url-sec').style.display = tab === 'url' ? 'block' : 'none';
    document.getElementById('img-file-sec').style.display = tab === 'file' ? 'block' : 'none';
    document.getElementById('itab-url').classList.toggle('active', tab === 'url');
    document.getElementById('itab-file').classList.toggle('active', tab === 'file');
}

// ── LOAD MOVIES ───────────────────────────────────────────────────────
// GET /admin/movies — returns all movies globally (no theater filter)
async function loadMovies() {
    try {
        const res = await axios.get('/admin/movies');
        allMovies = res.data;
        document.getElementById('statMovies').textContent = allMovies.length;

        const grid = document.getElementById('moviesGrid');
        if (!allMovies.length) {
            grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🎬</div><div>No movies yet. Add one!</div></div>';
            return;
        }
        grid.innerHTML = allMovies.map(m => {
            const img = m.imageUrl || m.imagePath;
            return `
            <div class="movie-card">
                ${img
                    ? `<img class="movie-poster" src="${img}" alt="${m.title}" onerror="this.style.display='none'">`
                    : `<div class="movie-poster-ph">🎬</div>`}
                <div class="movie-info">
                    <div class="movie-title-card" title="${m.title}">${m.title}</div>
                    <div class="movie-dur">${m.durationMinutes || '--'} min</div>
                    <button class="btn-danger" style="font-size:0.72rem;padding:3px 8px"
                        onclick="deleteMovie(${m.id})">Delete</button>
                </div>
            </div>`;
        }).join('');
    } catch(e) { showToast('Failed to load movies', 'error'); }
}

// ── LOAD THEATERS ─────────────────────────────────────────────────────
async function loadTheaters() {
    try {
        const res = await axios.get('/admin/theaters');
        allTheaters = res.data;
        document.getElementById('statTheaters').textContent = allTheaters.length;
        const tbody = document.getElementById('theatersBody');
        if (!allTheaters.length) {
            tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">🏛️</div><div>No theaters yet.</div></div></td></tr>';
            return;
        }
        tbody.innerHTML = allTheaters.map(t => `
            <tr>
                <td class="td-id">#${t.id}</td>
                <td style="font-weight:500">${t.name}</td>
                <td><span class="city-badge">${t.city}</span></td>
                <td><span class="seats-badge">${t.totalSeats} seats</span></td>
                <td><div class="actions-cell"><button class="btn-danger" onclick="deleteTheater(${t.id})">Delete</button></div></td>
            </tr>`).join('');
    } catch(e) { showToast('Failed to load theaters', 'error'); }
}

// ── LOAD SHOWS BY THEATER ─────────────────────────────────────────────
// Fetches shows for all movies and groups them by theater
// This is the correct design — shows have both movie + theater
async function loadShowsByTheater() {
    const container = document.getElementById('showsByTheater');
    container.innerHTML = '<div class="loading">Loading shows...</div>';
    try {
        const moviesRes = await axios.get('/admin/movies');
        const movies = moviesRes.data;

        // Fetch shows for every movie in parallel
        const allShowsArr = [];
        await Promise.all(movies.map(async m => {
            try {
                const res = await axios.get('/admin/movies/' + m.id + '/shows');
                allShowsArr.push(...res.data);
            } catch(e) {}
        }));

        document.getElementById('statShows').textContent = allShowsArr.length;

        if (!allShowsArr.length) {
            container.innerHTML = '<div class="empty-state"><div class="empty-icon">🕐</div><div>No shows yet. Click + Add Show!</div></div>';
            return;
        }

        // Group by theater
        const byTheater = {};
        allShowsArr.forEach(s => {
            const tid = s.theater?.id || 'unknown';
            if (!byTheater[tid]) byTheater[tid] = { theater: s.theater || {}, shows: [] };
            byTheater[tid].shows.push(s);
        });

        container.innerHTML = Object.values(byTheater).map(group => {
            const t = group.theater;
            const rows = group.shows.map(s => {
                const dt = new Date(s.showTime);
                const dateStr = dt.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
                const timeStr = dt.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
                return `
                <div class="show-row">
                    <div>
                        <div class="show-movie-name">🎬 ${s.movie?.title || 'Movie'}</div>
                        <div class="show-time-info">📅 ${dateStr} at ${timeStr}</div>
                    </div>
                    <div style="display:flex;align-items:center;gap:12px">
                        <div class="show-prices">
                            <span class="price-chip gold">🥇 ₹${s.goldPrice}</span>
                            <span class="price-chip silver">🥈 ₹${s.silverPrice}</span>
                            <span class="price-chip diamond">💎 ₹${s.diamondPrice}</span>
                        </div>
                        <button class="btn-danger" style="font-size:0.72rem;padding:3px 8px"
                            onclick="deleteShow(${s.id})">Del</button>
                    </div>
                </div>`;
            }).join('');
            return `
            <div class="theater-panel">
                <div class="theater-panel-hdr">
                    <div>
                        <div class="theater-panel-name">${t.name || 'Theater'}</div>
                        <div style="font-size:0.78rem;color:var(--muted);margin-top:2px">📍 ${t.city || ''} · ${t.totalSeats || '--'} seats</div>
                    </div>
                    <span class="city-badge">${group.shows.length} shows</span>
                </div>
                <div class="shows-section">${rows}</div>
            </div>`;
        }).join('');
    } catch(e) { showToast('Failed to load shows', 'error'); }
}

// ── ADD MOVIE ─────────────────────────────────────────────────────────
// Movie is global — no theater assignment here
async function addMovie() {
    const title = document.getElementById('m-title').value.trim();
    const description = document.getElementById('m-desc').value.trim();
    const durationMinutes = parseInt(document.getElementById('m-duration').value);
    const imageUrl = document.getElementById('m-imageUrl').value.trim();
    const fileInput = document.getElementById('m-imageFile');
    const hasFile = fileInput.files && fileInput.files[0];

    if (!title) { showToast('Movie title required', 'error'); return; }
    if (!durationMinutes || isNaN(durationMinutes)) { showToast('Valid duration required', 'error'); return; }

    try {
        if (hasFile) {
            const fd = new FormData();
            fd.append('title', title);
            fd.append('description', description);
            fd.append('durationMinutes', durationMinutes);
            if (imageUrl) fd.append('imageUrl', imageUrl);
            fd.append('imageFile', fileInput.files[0]);
            await axios.post('/admin/movies/upload', fd, { headers: { 'Content-Type': 'multipart/form-data' } });
        } else {
            await axios.post('/admin/movies/add', { title, description, durationMinutes, imageUrl });
        }
        closeModal('addMovieModal');
        document.getElementById('m-title').value = '';
        document.getElementById('m-desc').value = '';
        document.getElementById('m-duration').value = '';
        document.getElementById('m-imageUrl').value = '';
        showToast('Movie added!');
        loadMovies();
    } catch(e) { showToast('Failed to add movie', 'error'); }
}

// ── DELETE MOVIE ──────────────────────────────────────────────────────
async function deleteMovie(id) {
    if (!confirm('Delete this movie and all its shows?')) return;
    try {
        await axios.delete('/admin/movies/' + id);
        showToast('Movie deleted');
        loadMovies();
    } catch(e) { showToast('Failed to delete movie', 'error'); }
}

// ── ADD THEATER ───────────────────────────────────────────────────────
async function addTheater() {
    const name = document.getElementById('t-name').value.trim();
    const city = document.getElementById('t-city').value.trim();
    const totalSeats = parseInt(document.getElementById('t-seats').value);
    if (!name || !city || !totalSeats) { showToast('Fill all fields', 'error'); return; }
    try {
        await axios.post('/admin/theaters', { name, city, totalSeats });
        closeModal('addTheaterModal');
        document.getElementById('t-name').value = '';
        document.getElementById('t-city').value = '';
        document.getElementById('t-seats').value = '';
        showToast('Theater added!');
        loadTheaters();
    } catch(e) { showToast('Failed to add theater', 'error'); }
}

// ── DELETE THEATER ────────────────────────────────────────────────────
async function deleteTheater(id) {
    if (!confirm('Delete this theater?')) return;
    try {
        await axios.delete('/admin/theaters/' + id);
        showToast('Theater deleted');
        loadTheaters();
    } catch(e) { showToast('Failed to delete', 'error'); }
}

// ── OPEN ADD SHOW MODAL ───────────────────────────────────────────────
// Loads fresh movies and theaters into dropdowns
async function openAddShowModal() {
    try {
        const [mr, tr] = await Promise.all([
            axios.get('/admin/movies'),
            axios.get('/admin/theaters')
        ]);
        allMovies = mr.data;
        allTheaters = tr.data;
    } catch(e) {}

    // Populate movie dropdown
    const ms = document.getElementById('s-movieId');
    ms.innerHTML = '<option value="">-- Select a movie --</option>';
    allMovies.forEach(m => {
        ms.innerHTML += `<option value="${m.id}">${m.title} (${m.durationMinutes} min)</option>`;
    });

    // Populate theater dropdown
    const ts = document.getElementById('s-theaterId');
    ts.innerHTML = '<option value="">-- Select a theater --</option>';
    allTheaters.forEach(t => {
        ts.innerHTML += `<option value="${t.id}">${t.name} — ${t.city}</option>`;
    });

    document.getElementById('s-showTime').value = '';
    document.getElementById('s-gold').value = '';
    document.getElementById('s-silver').value = '';
    document.getElementById('s-diamond').value = '';
    openModal('addShowModal');
}

// ── ADD SHOW ──────────────────────────────────────────────────────────
// POST /admin/movies/shows
// Sends: { movieId, theaterId, showTime, goldPrice, silverPrice, diamondPrice }
// Show entity links movie + theater — correct production design
async function addShow() {
    const movieId = document.getElementById('s-movieId').value;
    const theaterId = document.getElementById('s-theaterId').value;
    const showTime = document.getElementById('s-showTime').value;
    const goldPrice = parseFloat(document.getElementById('s-gold').value);
    const silverPrice = parseFloat(document.getElementById('s-silver').value);
    const diamondPrice = parseFloat(document.getElementById('s-diamond').value);

    if (!movieId) { showToast('Select a movie', 'error'); return; }
    if (!theaterId) { showToast('Select a theater', 'error'); return; }
    if (!showTime) { showToast('Select date and time', 'error'); return; }
    if (!goldPrice || !silverPrice || !diamondPrice) { showToast('Enter all prices', 'error'); return; }

    try {
        await axios.post('/admin/movies/shows', {
            movieId: parseInt(movieId),
            theaterId: parseInt(theaterId),
            showTime: showTime,
            goldPrice, silverPrice, diamondPrice
        });
        closeModal('addShowModal');
        showToast('Show added!');
        loadShowsByTheater();
        // Switch to shows tab
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-shows').classList.add('active');
        document.querySelectorAll('.tab')[2].classList.add('active');
    } catch(e) { showToast('Failed to add show', 'error'); }
}

// ── DELETE SHOW ───────────────────────────────────────────────────────
async function deleteShow(id) {
    if (!confirm('Delete this show?')) return;
    try {
        await axios.delete('/admin/shows/' + id);
        showToast('Show deleted');
        loadShowsByTheater();
    } catch(e) { showToast('Failed to delete show', 'error'); }
}

// ── INIT ──────────────────────────────────────────────────────────────
loadMovies();

</script>
