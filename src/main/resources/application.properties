spring.application.name=MovieBooking
# ---------- Server ----------
server.port=8081

# ---------- MySQL ----------
spring.datasource.url=jdbc:mysql://localhost:3306/movie_booking?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.security.enabled=false
logging.level.org.springframework.security=DEBUG
logging.level.com.sb.MovieBooking.service.CustomUserDetailsService=DEBUG
 
logging.level.org.springframework.security.authentication.dao.DaoAuthenticationProvider=TRACE

spring.thymeleaf.enabled=true
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
