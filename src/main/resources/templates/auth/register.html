<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
</head>
<body>
<h2>Register New User</h2>

<!-- Binds to User object from AuthController.registerPage()Used by: AuthController.registerPage() → model.addAttribute("user", new User()) -->
<form th:action="@{/register}" method="post" th:object="${user}">
    <p>
        <label for="name">Name</label>
        <input type="text" id="name" th:field="*{name}" placeholder="Name" required>
    </p>
    <p>
        <label for="email">Email</label>
        <input type="email" id="email" th:field="*{email}" placeholder="Email" required>
    </p>
    <p>
        <label for="password">Password</label>
        <input type="password" id="password" th:field="*{password}" placeholder="Password" required>
    </p>
    <button type="submit">Register</button>
</form>

<a th:href="@{/login}">Already have an account? Login</a>
</body>
</html>
