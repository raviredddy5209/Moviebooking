<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Movie Booking - Login</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .login-container { max-width: 400px; margin: 100px auto; padding: 30px; border: 1px solid #ddd; border-radius: 10px; }
        .login-section { margin-bottom: 20px; }
        input { margin-bottom: 10px; }
        .api-section { border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body class="bg-light">
    <div class="login-container">
        <h2 class="text-center mb-4">🎬 Movie Booking</h2>

        <div th:if="${param.error}" class="alert alert-danger">
            Login failed. Check email/password.
        </div>
        <div th:if="${param.logout}" class="alert alert-info">
            You have been logged out.
        </div>

        <div class="login-section">
            <h5>Traditional Login</h5>
            <form th:action="@{/doLogin}" method="post">
                <input type="email" class="form-control" name="email" placeholder="admin@example.com" required autofocus>
                <input type="password" class="form-control" name="password" placeholder="1234" required>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>
        </div>

        <div class="api-section">
            <h5>API JWT Login</h5>
            <input type="email" id="emailApi" class="form-control" placeholder="admin@example.com" value="admin@example.com">
            <input type="password" id="passwordApi" class="form-control" placeholder="1234" value="1234">
            <button onclick="apiLogin()" class="btn btn-success w-100">JWT Login</button>
        </div>

        <div id="message" class="mt-3"></div>
        <a th:href="@{/register}" class="d-block mt-3 text-center">New user? Register</a>
    </div>

    <script>
    async function apiLogin() {
        const email = document.getElementById('emailApi').value;
        const password = document.getElementById('passwordApi').value;
        const messageDiv = document.getElementById('message');

        try {
            messageDiv.innerHTML = '<div class="alert alert-info">Logging in...</div>';

            // Step 1 - Browser sends email + password to Spring Boot
            // Axios sends this JSON to your backend:
            // { "email": "admin@example.com", "password": "1234" }
            const res = await axios.post('/api/auth/login', { email, password });

            // Step 2 - Spring Boot receives it in ApiAuthController
            // res.data is the JWT token string: "Bearer eyJ..."
            const token = res.data;
            localStorage.setItem('token', token);

            // Step 3 - Decode JWT payload to check role
            // token.split('.')[1] gets the middle part of the JWT
            // atob() decodes Base64 -> JSON string
            // JSON.parse() converts it to a JS object
            const payload = JSON.parse(atob(token.split('.')[1]));
            const isAdmin = payload.roles.some(r => r.authority === 'ROLE_ADMIN');

            // Step 4 - Redirect based on role
            if (isAdmin) {
                window.location.href = '/admin/dashboard';
            } else {
                // User goes here, NOT /admin
                window.location.href = '/user/home';
            }

        } catch (err) {
            messageDiv.innerHTML = '<div class="alert alert-danger">API Login failed!</div>';
        }
    }

    // Auto-focus email input on page load
    document.getElementById('emailApi').focus();
    </script>
</body>
</html>
