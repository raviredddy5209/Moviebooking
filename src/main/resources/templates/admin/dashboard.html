<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #888;
    --border: rgba(255,255,255,0.08);
    --gold: #FFD700;
    --silver: #C0C0C0;
    --diamond: #b9f2ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* NAV */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; }
  .nav-brand span { color: var(--accent); }
  .nav-right { display: flex; align-items: center; gap: 1rem; }
  .badge-admin {
    background: var(--accent);
    color: #000;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .btn-logout {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-logout:hover { border-color: #ff4444; color: #ff4444; }

  /* LAYOUT */
  .main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }
  .page-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; }
  .page-title span { color: var(--accent); }

  /* BUTTONS */
  .btn-primary-custom {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary-custom:hover { background: #d4eb2e; transform: translateY(-1px); }
  .btn-danger-custom {
    background: transparent;
    border: 1px solid rgba(255,68,68,0.3);
    color: #ff6b6b;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-danger-custom:hover { background: rgba(255,68,68,0.1); border-color: #ff4444; }
  .btn-accent2 {
    background: var(--accent2);
    color: #fff;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-accent2:hover { background: #e55a25; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* TABLE */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--surface2); }
  thead th {
    padding: 14px 16px;
    text-align: left;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  td { padding: 14px 16px; font-size: 0.9rem; vertical-align: middle; }
  .td-id { color: var(--muted); font-size: 0.8rem; font-family: monospace; }
  .city-badge {
    background: rgba(232,255,71,0.1);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 500;
  }
  .seats-badge {
    background: rgba(255,107,53,0.1);
    color: var(--accent2);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.78rem;
  }
  .actions-cell { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
  }
  .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 0.5rem; opacity: 0.4; }

  /* MODALS */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.2rem; }
  .modal-close {
    background: var(--surface2);
    border: none;
    color: var(--muted);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover { background: var(--border); color: var(--text); }

  /* FORMS */
  .form-group { margin-bottom: 1rem; }
  .form-label {
    display: block;
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  .form-control-custom {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.2s;
    outline: none;
  }
  .form-control-custom:focus { border-color: var(--accent); }
  .form-control-custom::placeholder { color: var(--muted); }
  textarea.form-control-custom { resize: vertical; min-height: 80px; }

  /* IMAGE TABS */
  .img-tab-group { display: flex; gap: 8px; margin-bottom: 1rem; }
  .img-tab {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 0.82rem;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .img-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.05); }

  /* PRICING GRID */
  .pricing-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .pricing-item label { font-size: 0.75rem; }
  .gold-label { color: var(--gold); }
  .silver-label { color: var(--silver); }
  .diamond-label { color: var(--diamond); }

  /* MOVIES SECTION */
  .movies-section {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-top: 1rem;
  }
  .movies-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .movies-section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
  .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
  .movie-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
  }
  .movie-card:hover { transform: translateY(-2px); border-color: rgba(232,255,71,0.2); }
  .movie-poster {
    width: 100%;
    height: 140px;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }
  .movie-poster-placeholder {
    width: 100%;
    height: 140px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 2rem;
  }
  .movie-info { padding: 10px 12px; }
  .movie-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .movie-duration { font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; }

  /* STAR RATING */
  .star-rating { display: flex; gap: 3px; margin-bottom: 8px; }
  .star {
    font-size: 1rem;
    cursor: pointer;
    color: #444;
    transition: color 0.15s, transform 0.1s;
    user-select: none;
  }
  .star:hover, .star.active { color: var(--gold); transform: scale(1.2); }
  .star.hover-active { color: var(--gold); }
  .rating-count { font-size: 0.72rem; color: var(--muted); margin-left: 4px; }

  .movie-actions { display: flex; gap: 6px; margin-top: 6px; }

  /* SHOWS */
  .shows-list { margin-top: 8px; }
  .show-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(185,242,255,0.07);
    border: 1px solid rgba(185,242,255,0.15);
    color: var(--diamond);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    margin: 2px 3px 2px 0;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 0.9rem;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 10px;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    max-width: 320px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(100,255,100,0.3); }
  .toast.error { border-color: rgba(255,68,68,0.3); }
  .toast-icon { font-size: 1.1rem; }

  /* SECTION DIVIDER */
  .section-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2rem 0;
  }

  /* COLLAPSIBLE MOVIES ROW */
  .movies-row { display: none; }
  .movies-row.open { display: table-row; }
  .movies-row td { padding: 0 16px 16px; }

  /* LOADING */
  .loading { color: var(--muted); font-size: 0.85rem; padding: 2rem; text-align: center; }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">Movie<span>Admin</span></div>
  <div class="nav-right">
    <span class="badge-admin">Admin</span>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="main">
  <div class="page-header">
    <div class="page-title">Theaters <span>&</span> Movies</div>
    <button class="btn-primary-custom" onclick="openModal('addTheaterModal')">
      + Add Theater
    </button>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Theater Name</th>
          <th>City</th>
          <th>Seats</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="theatersBody">
        <tr><td colspan="5" class="loading">Loading theaters...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ── ADD THEATER MODAL ──────────────────────────────── -->
<div class="modal-overlay" id="addTheaterModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Add New Theater</div>
      <button class="modal-close" onclick="closeModal('addTheaterModal')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Theater Name</label>
      <input class="form-control-custom" id="t-name" placeholder="e.g. PVR Hyderabad">
    </div>
    <div class="form-group">
      <label class="form-label">City</label>
      <input class="form-control-custom" id="t-city" placeholder="e.g. Hyderabad">
    </div>
    <div class="form-group">
      <label class="form-label">Total Seats</label>
      <input class="form-control-custom" id="t-seats" type="number" placeholder="e.g. 200">
    </div>
    <button class="btn-primary-custom" style="width:100%;justify-content:center" onclick="addTheater()">
      Add Theater
    </button>
  </div>
</div>

<!-- ── ADD MOVIE MODAL ──────────────────────────────── -->
<div class="modal-overlay" id="addMovieModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Add Movie</div>
      <button class="modal-close" onclick="closeModal('addMovieModal')">✕</button>
    </div>
    <input type="hidden" id="m-theaterId">
    <div class="form-group">
      <label class="form-label">Movie Title</label>
      <input class="form-control-custom" id="m-title" placeholder="e.g. Interstellar">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-control-custom" id="m-desc" placeholder="Short description..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Duration (minutes)</label>
      <input class="form-control-custom" id="m-duration" type="number" placeholder="e.g. 169">
    </div>
    <div class="form-group">
      <label class="form-label">Movie Image</label>
      <div class="img-tab-group">
        <button class="img-tab active" id="tab-url" onclick="switchImgTab('url')">Paste URL</button>
        <button class="img-tab" id="tab-file" onclick="switchImgTab('file')">Upload File</button>
      </div>
      <div id="img-url-section">
        <input class="form-control-custom" id="m-imageUrl" placeholder="https://...poster.jpg">
      </div>
      <div id="img-file-section" style="display:none">
        <input class="form-control-custom" id="m-imageFile" type="file" accept="image/*" style="padding:6px">
      </div>
    </div>
    <button class="btn-primary-custom" style="width:100%;justify-content:center" onclick="addMovie()">
      Add Movie
    </button>
  </div>
</div>

<!-- ── ADD SHOW MODAL ──────────────────────────────── -->
<div class="modal-overlay" id="addShowModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">Add Show Timing</div>
      <button class="modal-close" onclick="closeModal('addShowModal')">✕</button>
    </div>
    <input type="hidden" id="s-movieId">
    <div class="form-group">
      <label class="form-label">Show Date & Time</label>
      <input class="form-control-custom" id="s-showTime" type="datetime-local">
    </div>
    <div class="form-group">
      <label class="form-label">Pricing by Section</label>
      <div class="pricing-grid">
        <div class="pricing-item">
          <label class="form-label gold-label">Gold (₹)</label>
          <input class="form-control-custom" id="s-gold" type="number" placeholder="500">
        </div>
        <div class="pricing-item">
          <label class="form-label silver-label">Silver (₹)</label>
          <input class="form-control-custom" id="s-silver" type="number" placeholder="300">
        </div>
        <div class="pricing-item">
          <label class="form-label diamond-label">Diamond (₹)</label>
          <input class="form-control-custom" id="s-diamond" type="number" placeholder="700">
        </div>
      </div>
    </div>
    <button class="btn-primary-custom" style="width:100%;justify-content:center" onclick="addShow()">
      Add Show
    </button>
  </div>
</div>

<!-- ── TOAST ──────────────────────────────── -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toastIcon"></span>
  <span id="toastMsg"></span>
</div>

<script>
// ── AUTH ──────────────────────────────────────────────
const token = localStorage.getItem('token');
if (!token) window.location.href = '/login';
axios.defaults.headers.common['Authorization'] = token;

// ✅ New — clears token and goes to index.html (JWT login page)
function logout() {
    // ── Remove JWT token from localStorage ────────────────
    // Without this token, next API call will fail
    // User will be treated as unauthenticated
    localStorage.removeItem('token');

    // ── Clear axios default header ────────────────────────
    // Removes Authorization: Bearer token from all future axios calls
    delete axios.defaults.headers.common['Authorization'];

    // ── Redirect to login page ────────────────────────────
    // index.html is our JWT login page in static/ folder
    window.location.href = '/index.html';
}

// ── TOAST ──────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').textContent = type === 'success' ? '✓' : '✕';
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

// ── MODAL ──────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ── IMAGE TAB SWITCH ──────────────────────────────────
function switchImgTab(tab) {
  document.getElementById('img-url-section').style.display = tab === 'url' ? 'block' : 'none';
  document.getElementById('img-file-section').style.display = tab === 'file' ? 'block' : 'none';
  document.getElementById('tab-url').classList.toggle('active', tab === 'url');
  document.getElementById('tab-file').classList.toggle('active', tab === 'file');
}

// ── RATINGS (localStorage per movie, in real app use API) ──
function getRating(movieId) {
  return parseFloat(localStorage.getItem('rating_' + movieId)) || 0;
}
function getRatingCount(movieId) {
  return parseInt(localStorage.getItem('ratingCount_' + movieId)) || 0;
}
function saveRating(movieId, stars) {
  const old = getRating(movieId);
  const count = getRatingCount(movieId);
  const newCount = count + 1;
  const newAvg = ((old * count) + stars) / newCount;
  localStorage.setItem('rating_' + movieId, newAvg.toFixed(1));
  localStorage.setItem('ratingCount_' + movieId, newCount);
  return { avg: newAvg.toFixed(1), count: newCount };
}

function renderStars(movieId, containerId, countId) {
  const avg = getRating(movieId);
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const star = document.createElement('span');
    star.className = 'star' + (i <= Math.round(avg) ? ' active' : '');
    star.textContent = '★';
    star.dataset.val = i;
    star.dataset.movieId = movieId;
    star.dataset.containerId = containerId;
    star.dataset.countId = countId;
    star.addEventListener('mouseover', function() {
      const stars = container.querySelectorAll('.star');
      stars.forEach((s, idx) => s.classList.toggle('hover-active', idx < this.dataset.val));
    });
    star.addEventListener('mouseleave', function() {
      container.querySelectorAll('.star').forEach(s => s.classList.remove('hover-active'));
    });
    star.addEventListener('click', function() {
      const { avg, count } = saveRating(this.dataset.movieId, parseInt(this.dataset.val));
      renderStars(this.dataset.movieId, this.dataset.containerId, this.dataset.countId);
      document.getElementById(this.dataset.countId).textContent = avg + ' (' + count + ')';
      showToast('Rating saved!');
    });
    container.appendChild(star);
  }
}

// ── LOAD THEATERS ──────────────────────────────────────
async function loadTheaters() {
  try {
    const res = await axios.get('/admin/theaters');
    const tbody = document.getElementById('theatersBody');
    if (!res.data.length) {
      tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">🎭</div><div>No theaters yet. Add one!</div></div></td></tr>';
      return;
    }
    tbody.innerHTML = res.data.map(t => `
      <tr id="theater-row-${t.id}">
        <td class="td-id">#${t.id}</td>
        <td style="font-weight:500">${t.name}</td>
        <td><span class="city-badge">${t.city}</span></td>
        <td><span class="seats-badge">${t.totalSeats} seats</span></td>
        <td>
          <div class="actions-cell">
            <button class="btn-accent2" onclick="openAddMovie(${t.id})">+ Movie</button>
            <button class="btn-ghost" onclick="toggleMovies(${t.id})">Films</button>
            <button class="btn-danger-custom" onclick="deleteTheater(${t.id})">Delete</button>
          </div>
        </td>
      </tr>
      <tr class="movies-row" id="movies-row-${t.id}">
        <td colspan="5">
          <div class="movies-section">
            <div class="movies-section-header">
              <div class="movies-section-title">Now Showing at ${t.name}</div>
            </div>
            <div class="movies-grid" id="movies-grid-${t.id}">
              <div class="loading">Loading movies...</div>
            </div>
          </div>
        </td>
      </tr>
    `).join('');
  } catch (err) {
    document.getElementById('theatersBody').innerHTML =
      '<tr><td colspan="5" class="loading">Failed to load theaters</td></tr>';
  }
}

// ── TOGGLE MOVIES ROW ──────────────────────────────────
async function toggleMovies(theaterId) {
  const row = document.getElementById('movies-row-' + theaterId);
  const isOpen = row.classList.contains('open');
  row.classList.toggle('open');
  if (!isOpen) loadMovies(theaterId);
}

// ── LOAD MOVIES ──────────────────────────────────────────
async function loadMovies(theaterId) {
  const grid = document.getElementById('movies-grid-' + theaterId);
  try {
    const res = await axios.get('/admin/movies/theater/' + theaterId);
    if (!res.data.length) {
      grid.innerHTML = '<div style="color:var(--muted);font-size:0.85rem">No movies yet. Click "+ Movie" to add one.</div>';
      return;
    }
    grid.innerHTML = res.data.map(m => {
      const imgSrc = m.imageUrl || m.imagePath;
      const starContainerId = 'stars-' + m.id;
      const countId = 'rcount-' + m.id;
      const avg = getRating(m.id);
      const count = getRatingCount(m.id);
      return `
        <div class="movie-card">
          ${imgSrc
            ? `<img class="movie-poster" src="${imgSrc}" alt="${m.title}" onerror="this.style.display='none'">`
            : `<div class="movie-poster-placeholder">🎬</div>`
          }
          <div class="movie-info">
            <div class="movie-title" title="${m.title}">${m.title}</div>
            <div class="movie-duration">${m.durationMinutes} min</div>
            <div class="star-rating" id="${starContainerId}"></div>
            <div style="font-size:0.72rem;color:var(--muted);margin-bottom:8px">
              <span id="${countId}">${avg > 0 ? avg + ' (' + count + ')' : 'No ratings yet'}</span>
            </div>
            <div id="shows-${m.id}" class="shows-list"></div>
            <div class="movie-actions">
              <button class="btn-ghost" style="font-size:0.75rem;padding:4px 10px" onclick="openAddShow(${m.id})">+ Show</button>
              <button class="btn-danger-custom" style="font-size:0.75rem;padding:4px 10px" onclick="deleteMovie(${m.id}, ${theaterId})">Del</button>
            </div>
          </div>
        </div>
      `;
    }).join('');

    // Render stars + shows for each movie
    for (const m of res.data) {
      renderStars(m.id, 'stars-' + m.id, 'rcount-' + m.id);
      loadShows(m.id);
    }
  } catch (err) {
    grid.innerHTML = '<div style="color:#ff6b6b;font-size:0.85rem">Failed to load movies</div>';
  }
}

// ── LOAD SHOWS ──────────────────────────────────────────
async function loadShows(movieId) {
  try {
    const res = await axios.get('/admin/movies/' + movieId + '/shows');
    const el = document.getElementById('shows-' + movieId);
    if (!el) return;
    if (!res.data.length) { el.innerHTML = ''; return; }
    el.innerHTML = res.data.map(s => {
      const dt = new Date(s.showTime);
      const formatted = dt.toLocaleDateString('en-IN', { day:'numeric', month:'short' })
        + ' ' + dt.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
      return `<span class="show-chip">🕐 ${formatted}</span>`;
    }).join('');
  } catch (e) {}
}

// ── ADD THEATER ──────────────────────────────────────────
async function addTheater() {
  const name = document.getElementById('t-name').value.trim();
  const city = document.getElementById('t-city').value.trim();
  const totalSeats = parseInt(document.getElementById('t-seats').value);
  if (!name || !city || !totalSeats) { showToast('Fill all fields', 'error'); return; }
  try {
    await axios.post('/admin/theaters', { name, city, totalSeats });
    closeModal('addTheaterModal');
    document.getElementById('t-name').value = '';
    document.getElementById('t-city').value = '';
    document.getElementById('t-seats').value = '';
    showToast('Theater added!');
    loadTheaters();
  } catch (err) { showToast('Failed to add theater', 'error'); }
}

// ── DELETE THEATER ────────────────────────────────────────
async function deleteTheater(id) {
  if (!confirm('Delete this theater and all its movies?')) return;
  try {
    await axios.delete('/admin/theaters/' + id);
    showToast('Theater deleted');
    loadTheaters();
  } catch (err) { showToast('Failed to delete', 'error'); }
}

// ── ADD MOVIE ────────────────────────────────────────────
function openAddMovie(theaterId) {
  document.getElementById('m-theaterId').value = theaterId;
  document.getElementById('m-title').value = '';
  document.getElementById('m-desc').value = '';
  document.getElementById('m-duration').value = '';
  document.getElementById('m-imageUrl').value = '';
  openModal('addMovieModal');
}

async function addMovie() {
  const theaterId = document.getElementById('m-theaterId').value;
  const title = document.getElementById('m-title').value.trim();
  const description = document.getElementById('m-desc').value.trim();
  const durationMinutes = parseInt(document.getElementById('m-duration').value);
  const imageUrl = document.getElementById('m-imageUrl').value.trim();
  const fileInput = document.getElementById('m-imageFile');
  const hasFile = fileInput.files && fileInput.files[0];

  if (!title || !durationMinutes) { showToast('Fill required fields', 'error'); return; }

  try {
    if (hasFile) {
      const formData = new FormData();
      formData.append('title', title);
      formData.append('description', description);
      formData.append('durationMinutes', durationMinutes);
      formData.append('theaterId', theaterId);
      formData.append('imageFile', fileInput.files[0]);
      await axios.post('/admin/movies/upload', formData, {
        headers: { 'Content-Type': 'multipart/form-data' }
      });
    } else {
      await axios.post('/admin/movies', {
        title, description, durationMinutes, imageUrl,
        theater: { id: parseInt(theaterId) }
      });
    }
    closeModal('addMovieModal');
    showToast('Movie added!');
    loadMovies(theaterId);
  } catch (err) { showToast('Failed to add movie', 'error'); }
}

// ── DELETE MOVIE ─────────────────────────────────────────
async function deleteMovie(movieId, theaterId) {
  if (!confirm('Delete this movie?')) return;
  try {
    await axios.delete('/admin/movies/' + movieId);
    showToast('Movie deleted');
    loadMovies(theaterId);
  } catch (err) { showToast('Failed to delete movie', 'error'); }
}

// ── ADD SHOW ─────────────────────────────────────────────
function openAddShow(movieId) {
  document.getElementById('s-movieId').value = movieId;
  document.getElementById('s-showTime').value = '';
  document.getElementById('s-gold').value = '';
  document.getElementById('s-silver').value = '';
  document.getElementById('s-diamond').value = '';
  openModal('addShowModal');
}

async function addShow() {
  const movieId = document.getElementById('s-movieId').value;
  const showTime = document.getElementById('s-showTime').value;
  const goldPrice = parseFloat(document.getElementById('s-gold').value);
  const silverPrice = parseFloat(document.getElementById('s-silver').value);
  const diamondPrice = parseFloat(document.getElementById('s-diamond').value);
  if (!showTime || !goldPrice || !silverPrice || !diamondPrice) {
    showToast('Fill all fields', 'error'); return;
  }
  try {
    await axios.post('/admin/movies/' + movieId + '/shows', {
      showTime, goldPrice, silverPrice, diamondPrice
    });
    closeModal('addShowModal');
    showToast('Show timing added!');
    loadShows(movieId);
  } catch (err) { showToast('Failed to add show', 'error'); }
}

// ── INIT ─────────────────────────────────────────────────
loadTheaters();
</script>
</body>
</html>
