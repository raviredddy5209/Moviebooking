spring.application.name=MovieBooking
# ---------- Server ----------
server.port=8080

# ---------- MySQL ----------
spring.datasource.url=jdbc:mysql://localhost:3306/movie_booking?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root


 

logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
 
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
 
 # 64+ chars for HS256 security
jwt.secret=mySecretKeyWhichIsLongEnoughForHS256Algorithm12345678901234567890
jwt.expiration-ms=36000000  
# 10 hours
 


spring.security.enabled=false
logging.level.org.springframework.security=DEBUG
logging.level.com.sb.MovieBooking.service.CustomUserDetailsService=DEBUG
 
logging.level.org.springframework.security.authentication.dao.DaoAuthenticationProvider=TRACE

spring.thymeleaf.enabled=true
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Serve uploaded files
spring.web.resources.static-locations=classpath:/static/,file:uploads/